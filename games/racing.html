<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>1-Minute Racer | Vamsi Krapa</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg-primary: #0a0a1a;
      --bg-secondary: #0f0f2a;
      --text-primary: #f0f0ff;
      --text-muted: #8888aa;
      --accent-gradient: linear-gradient(135deg, #6c63ff 0%, #00d2ff 50%, #a855f7 100%);
      --card-bg: rgba(255,255,255,0.04);
      --card-border: rgba(255,255,255,0.06);
    }

    body {
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    header {
      padding: 16px 32px;
      display: flex;
      align-items: center;
      gap: 24px;
      border-bottom: 1px solid var(--card-border);
      background: rgba(10,10,26,0.95);
      backdrop-filter: blur(10px);
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .nav-logo {
      font-size: 1.4rem;
      font-weight: 900;
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      text-decoration: none;
      letter-spacing: -0.5px;
    }

    .header-divider {
      width: 1px;
      height: 24px;
      background: var(--card-border);
    }

    .page-title {
      font-size: 1rem;
      font-weight: 600;
      color: var(--text-primary);
      flex: 1;
    }

    .btn-back {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 8px 18px;
      background: var(--accent-gradient);
      color: #fff;
      text-decoration: none;
      border-radius: 8px;
      font-size: 0.875rem;
      font-weight: 600;
      transition: opacity 0.2s, transform 0.2s;
    }

    .btn-back:hover {
      opacity: 0.85;
      transform: translateY(-1px);
    }

    /* Main content */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      gap: 24px;
    }

    /* Canvas wrapper */
    .game-wrapper {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 16px;
      box-shadow: 0 0 40px rgba(108,99,255,0.12), 0 0 80px rgba(0,210,255,0.06);
      max-width: 100%;
      overflow: hidden;
    }

    canvas {
      display: block;
      border-radius: 8px;
      max-width: 100%;
    }

    /* Controls legend */
    .controls-legend {
      display: flex;
      gap: 24px;
      flex-wrap: wrap;
      justify-content: center;
      padding: 16px 24px;
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
    }

    .control-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.875rem;
    }

    .key {
      display: inline-block;
      padding: 3px 10px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.15);
      border-radius: 6px;
      font-family: monospace;
      font-size: 0.8rem;
      font-weight: 600;
      color: var(--text-primary);
    }

    .control-label {
      background: var(--accent-gradient);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      font-weight: 500;
    }

    .restart-hint {
      color: var(--text-muted);
      font-size: 0.8rem;
      text-align: center;
    }
  </style>
</head>
<body>
  <header>
    <a href="../index.html" class="nav-logo">VK</a>
    <div class="header-divider"></div>
    <span class="page-title">1-Minute Racer</span>
    <a href="../index.html" class="btn-back">← Back</a>
  </header>

  <main>
    <div class="game-wrapper">
      <canvas id="c"></canvas>
    </div>

    <div class="controls-legend">
      <div class="control-item">
        <span class="key">↑</span>
        <span class="control-label">Accelerate</span>
      </div>
      <div class="control-item">
        <span class="key">↓</span>
        <span class="control-label">Brake</span>
      </div>
      <div class="control-item">
        <span class="key">←</span>
        <span class="control-label">Steer Left</span>
      </div>
      <div class="control-item">
        <span class="key">→</span>
        <span class="control-label">Steer Right</span>
      </div>
    </div>

    <p class="restart-hint">Press <strong>R</strong> after the race ends to restart</p>
  </main>

  <script>
const W = 900, H = 600;
const canvas = document.getElementById('c');
canvas.width = W; canvas.height = H;
const ctx = canvas.getContext('2d');

// Track control points (world coords)
const CTRL = [
  {x:1000,y:150},{x:1350,y:150},{x:1550,y:280},{x:1620,y:480},
  {x:1580,y:700},{x:1420,y:880},{x:1150,y:980},{x:850,y:1020},
  {x:550,y:980},{x:350,y:860},{x:200,y:680},{x:180,y:460},
  {x:280,y:300},{x:500,y:180},{x:750,y:130}
];

const TRACK_W = 150;
const MAX_SPD = 520;
const ACCEL = 340;
const FRICT = 0.976;
const TURN = 2.3;

// Catmull-Rom interpolation
function cr(p0,p1,p2,p3,t) {
  const t2=t*t, t3=t2*t;
  return {
    x:0.5*((2*p1.x)+(-p0.x+p2.x)*t+(2*p0.x-5*p1.x+4*p2.x-p3.x)*t2+(-p0.x+3*p1.x-3*p2.x+p3.x)*t3),
    y:0.5*((2*p1.y)+(-p0.y+p2.y)*t+(2*p0.y-5*p1.y+4*p2.y-p3.y)*t2+(-p0.y+3*p1.y-3*p2.y+p3.y)*t3)
  };
}

// Build dense track samples
const N = CTRL.length;
const SPG = 45; // samples per segment
const track = [];
for (let i=0; i<N; i++) {
  for (let j=0; j<SPG; j++) {
    track.push(cr(CTRL[(i-1+N)%N], CTRL[i], CTRL[(i+1)%N], CTRL[(i+2)%N], j/SPG));
  }
}
const TL = track.length;

function nearestIdx(x, y) {
  let minD=Infinity, idx=0;
  for (let i=0; i<TL; i++) {
    const dx=x-track[i].x, dy=y-track[i].y;
    const d=dx*dx+dy*dy;
    if (d<minD) { minD=d; idx=i; }
  }
  return { dist:Math.sqrt(minD), idx };
}

// Game state
let car, camX, camY, keys, timeLeft, running, finished, lapCount, bestLap, lapStart, passedMid;

function init() {
  // Start 6 samples past S/F line
  const si = 6;
  const d = {x: track[si+1].x-track[si].x, y: track[si+1].y-track[si].y};
  const len = Math.sqrt(d.x*d.x+d.y*d.y);
  car = { x:track[si].x, y:track[si].y, angle:Math.atan2(d.y/len, d.x/len), speed:0 };
  camX = car.x - W/2;
  camY = car.y - H/2;
  keys = {};
  timeLeft = 60;
  running = false;
  finished = false;
  lapCount = 0;
  bestLap = null;
  lapStart = 0;
  passedMid = false;
}

init();

document.addEventListener('keydown', e => {
  const arrow = ['ArrowUp','ArrowDown','ArrowLeft','ArrowRight'].includes(e.key);
  if (arrow) e.preventDefault();
  keys[e.key] = true;
  if (arrow && !running && !finished) { running=true; lapStart=performance.now(); }
  if ((e.key==='r'||e.key==='R') && finished) init();
});
document.addEventListener('keyup', e => { keys[e.key]=false; });

let last = null;

function loop(now) {
  if (!last) last=now;
  const dt = Math.min((now-last)/1000, 0.05);
  last=now;

  if (running && !finished) {
    timeLeft -= dt;
    if (timeLeft<=0) { timeLeft=0; running=false; finished=true; }

    const {dist,idx} = nearestIdx(car.x, car.y);
    const onTrack = dist < TRACK_W/2;
    const grip = onTrack ? 1.0 : 0.22;

    const spd = Math.abs(car.speed);
    const turnAmt = TURN * Math.min(spd/80, 1) * dt;
    if (keys['ArrowLeft'])  car.angle -= turnAmt * grip;
    if (keys['ArrowRight']) car.angle += turnAmt * grip;
    if (keys['ArrowUp'])    car.speed = Math.min(car.speed + ACCEL*dt*grip, MAX_SPD*(onTrack?1:0.3));
    if (keys['ArrowDown'])  car.speed = Math.max(car.speed - ACCEL*1.8*dt, -120);

    car.speed *= onTrack ? FRICT : 0.88;
    if (Math.abs(car.speed)<1) car.speed=0;

    car.x += Math.cos(car.angle)*car.speed*dt;
    car.y += Math.sin(car.angle)*car.speed*dt;

    // Lap detection: must cross midpoint (idx~TL/2) before S/F line counts
    if (idx > TL*0.42 && idx < TL*0.58) passedMid=true;
    if (passedMid && idx < 10) {
      lapCount++;
      const lt = (performance.now()-lapStart)/1000;
      if (!bestLap || lt<bestLap) bestLap=lt;
      lapStart=performance.now();
      passedMid=false;
    }
  }

  // Camera smooth follow
  camX += (car.x-W/2 - camX)*0.13;
  camY += (car.y-H/2 - camY)*0.13;

  render();
  requestAnimationFrame(loop);
}

function drawPath() {
  ctx.beginPath();
  ctx.moveTo(track[0].x, track[0].y);
  for (let i=1; i<TL; i++) ctx.lineTo(track[i].x, track[i].y);
  ctx.closePath();
}

function render() {
  ctx.save();
  ctx.translate(-camX, -camY);

  // Grass
  ctx.fillStyle='#2d6e35';
  ctx.fillRect(camX-10, camY-10, W+20, H+20);

  // Grass texture (dots)
  ctx.fillStyle='#256030';
  for (let gx=Math.floor(camX/40)*40; gx<camX+W; gx+=40) {
    for (let gy=Math.floor(camY/40)*40; gy<camY+H; gy+=40) {
      ctx.beginPath();
      ctx.arc(gx+20, gy+20, 3, 0, Math.PI*2);
      ctx.fill();
    }
  }

  ctx.lineCap='round'; ctx.lineJoin='round';

  // Track border (kerb)
  drawPath();
  ctx.strokeStyle='#cc2222';
  ctx.lineWidth=TRACK_W+18;
  ctx.stroke();

  // White track edge
  drawPath();
  ctx.strokeStyle='#f0f0f0';
  ctx.lineWidth=TRACK_W+8;
  ctx.stroke();

  // Asphalt
  drawPath();
  ctx.strokeStyle='#4a4a4a';
  ctx.lineWidth=TRACK_W;
  ctx.stroke();

  // Center dashes
  drawPath();
  ctx.strokeStyle='rgba(255,220,0,0.55)';
  ctx.lineWidth=3;
  ctx.setLineDash([30,45]);
  ctx.stroke();
  ctx.setLineDash([]);

  // Start/finish line
  const sf=track[0], sfN=track[1];
  const sfDx=sfN.x-sf.x, sfDy=sfN.y-sf.y;
  const sfLen=Math.sqrt(sfDx*sfDx+sfDy*sfDy);
  const tnx=-sfDy/sfLen, tny=sfDx/sfLen; // normal (across track)
  const boxes=10, bw=TRACK_W/boxes, lt=22;
  for (let i=0; i<boxes; i++) {
    for (let j=0; j<2; j++) {
      ctx.fillStyle=(i+j)%2===0?'#fff':'#111';
      const t0=(i/boxes-0.5)*TRACK_W, t1=((i+1)/boxes-0.5)*TRACK_W;
      const along0=j*lt-lt, along1=(j+1)*lt-lt;
      const tdxn=sfDx/sfLen, tdyn=sfDy/sfLen;
      ctx.beginPath();
      ctx.moveTo(sf.x+tnx*t0+tdxn*along0, sf.y+tny*t0+tdyn*along0);
      ctx.lineTo(sf.x+tnx*t1+tdxn*along0, sf.y+tny*t1+tdyn*along0);
      ctx.lineTo(sf.x+tnx*t1+tdxn*along1, sf.y+tny*t1+tdyn*along1);
      ctx.lineTo(sf.x+tnx*t0+tdxn*along1, sf.y+tny*t0+tdyn*along1);
      ctx.closePath();
      ctx.fill();
    }
  }

  // Car shadow
  ctx.save();
  ctx.translate(car.x+4, car.y+4);
  ctx.rotate(car.angle);
  ctx.fillStyle='rgba(0,0,0,0.35)';
  ctx.fillRect(-15,-9,32,18);
  ctx.restore();

  // Car body
  ctx.save();
  ctx.translate(car.x, car.y);
  ctx.rotate(car.angle);

  // Main body
  ctx.fillStyle='#e74c3c';
  ctx.beginPath();
  ctx.moveTo(17, 0);
  ctx.lineTo(13, -9);
  ctx.lineTo(-15, -9);
  ctx.lineTo(-17, -5);
  ctx.lineTo(-17, 5);
  ctx.lineTo(-15, 9);
  ctx.lineTo(13, 9);
  ctx.closePath();
  ctx.fill();

  // Cockpit/roll bar
  ctx.fillStyle='#222';
  ctx.fillRect(-6, -6, 12, 12);

  // Windshield
  ctx.fillStyle='rgba(150,210,255,0.75)';
  ctx.fillRect(2, -6, 8, 12);

  // Front nose
  ctx.fillStyle='#c0392b';
  ctx.fillRect(13, -4, 6, 8);

  // Wheels
  ctx.fillStyle='#1a1a1a';
  ctx.strokeStyle='#555';
  ctx.lineWidth=1;
  [[-9,-12],[-9,8],[5,-12],[5,8]].forEach(([wx,wy])=>{
    ctx.fillRect(wx, wy, 9, 4);
    ctx.strokeRect(wx, wy, 9, 4);
  });

  // Wheel highlights
  ctx.fillStyle='#444';
  [[-9,-12],[-9,8],[5,-12],[5,8]].forEach(([wx,wy])=>{
    ctx.fillRect(wx+1, wy+1, 3, 2);
  });

  ctx.restore();
  ctx.restore();

  // Minimap (top-right corner)
  drawMinimap();

  // HUD overlay
  drawHUD();
}

function drawMinimap() {
  const mx=W-130, my=10, mw=120, mh=90;
  // Find track bounds
  let minX=Infinity,maxX=-Infinity,minY=Infinity,maxY=-Infinity;
  for (const p of track) {
    if(p.x<minX)minX=p.x; if(p.x>maxX)maxX=p.x;
    if(p.y<minY)minY=p.y; if(p.y>maxY)maxY=p.y;
  }
  const tw=maxX-minX, th=maxY-minY;
  const scale=Math.min(mw/tw, mh/th)*0.85;
  const ox=mx+(mw-tw*scale)/2, oy=my+(mh-th*scale)/2;

  ctx.fillStyle='rgba(0,0,0,0.7)';
  ctx.fillRect(mx, my, mw, mh);
  ctx.strokeStyle='#555';
  ctx.lineWidth=1;
  ctx.strokeRect(mx, my, mw, mh);

  // Track outline on minimap
  ctx.strokeStyle='#777';
  ctx.lineWidth=4*scale*TRACK_W/100;
  ctx.lineCap='round'; ctx.lineJoin='round';
  ctx.beginPath();
  for (let i=0; i<TL; i++) {
    const px=ox+(track[i].x-minX)*scale;
    const py=oy+(track[i].y-minY)*scale;
    if(i===0) ctx.moveTo(px,py); else ctx.lineTo(px,py);
  }
  ctx.closePath();
  ctx.stroke();

  // Car dot on minimap
  const cx=ox+(car.x-minX)*scale;
  const cy=oy+(car.y-minY)*scale;
  ctx.fillStyle='#e74c3c';
  ctx.beginPath();
  ctx.arc(cx, cy, 3.5, 0, Math.PI*2);
  ctx.fill();
}

function drawHUD() {
  // Top bar
  ctx.fillStyle='rgba(0,0,0,0.78)';
  ctx.fillRect(0, 0, W, 54);

  // Timer (center)
  const s=Math.ceil(timeLeft);
  const min=Math.floor(timeLeft/60);
  const sec=Math.floor(timeLeft%60);
  const ms=Math.floor((timeLeft%1)*10);
  const tStr=`${min}:${String(sec).padStart(2,'0')}.${ms}`;
  ctx.font='bold 40px monospace';
  ctx.textAlign='center';
  ctx.fillStyle=timeLeft<10?'#e74c3c':timeLeft<20?'#f39c12':'#f1c40f';
  ctx.fillText(tStr, W/2, 40);

  // Laps (left)
  ctx.fillStyle='#fff';
  ctx.font='bold 18px Arial';
  ctx.textAlign='left';
  ctx.fillText(`LAPS: ${lapCount}`, 16, 36);

  // Best lap (right, before minimap)
  ctx.textAlign='right';
  ctx.fillStyle='#aaa';
  ctx.fillText(bestLap?`BEST: ${bestLap.toFixed(2)}s`:`BEST: --`, W-140, 36);

  // Speed bar (bottom-left)
  const spdPct = Math.min(Math.abs(car.speed)/MAX_SPD, 1);
  ctx.fillStyle='rgba(0,0,0,0.65)';
  ctx.fillRect(14, H-42, 190, 24);
  const barColor = spdPct>0.85?'#e74c3c': spdPct>0.55?'#f39c12':'#2ecc71';
  ctx.fillStyle=barColor;
  ctx.fillRect(14, H-42, 190*spdPct, 24);
  ctx.strokeStyle='rgba(255,255,255,0.3)';
  ctx.lineWidth=1;
  ctx.strokeRect(14, H-42, 190, 24);
  ctx.fillStyle='#fff';
  ctx.font='bold 13px Arial';
  ctx.textAlign='left';
  const kmh = Math.round(spdPct*240);
  ctx.fillText(`${kmh} km/h`, 212, H-24);

  // Off-track warning
  const {dist} = nearestIdx(car.x, car.y);
  if (dist > TRACK_W/2 && running) {
    ctx.fillStyle='rgba(220,50,50,0.25)';
    ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#e74c3c';
    ctx.font='bold 22px Arial';
    ctx.textAlign='center';
    ctx.fillText('OFF TRACK!', W/2, H-60);
  }

  // Arrow key control hints (bottom right)
  if (running && !finished) {
    ctx.fillStyle='rgba(255,255,255,0.18)';
    ctx.font='12px Arial';
    ctx.textAlign='right';
    ctx.fillText('↑↓ Accel/Brake  ←→ Steer', W-14, H-14);
  }

  // Start screen
  if (!running && !finished) {
    ctx.fillStyle='rgba(0,0,0,0.88)';
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle='#f1c40f';
    ctx.font='bold 58px Arial';
    ctx.textAlign='center';
    ctx.fillText('1-MINUTE RACER', W/2, H/2-90);

    ctx.strokeStyle='#f1c40f';
    ctx.lineWidth=2;
    ctx.strokeRect(W/2-200, H/2-110, 400, 10);

    ctx.fillStyle='#ddd';
    ctx.font='22px Arial';
    ctx.fillText('↑  Accelerate     ↓  Brake', W/2, H/2-20);
    ctx.fillText('←  Steer Left     →  Steer Right', W/2, H/2+18);

    ctx.fillStyle='#2ecc71';
    ctx.font='bold 28px Arial';
    ctx.fillText('Press any arrow key to start!', W/2, H/2+72);

    ctx.fillStyle='#888';
    ctx.font='17px Arial';
    ctx.fillText('Complete as many laps as possible in 60 seconds', W/2, H/2+112);
  }

  // End screen
  if (finished) {
    ctx.fillStyle='rgba(0,0,0,0.9)';
    ctx.fillRect(0,0,W,H);

    ctx.fillStyle='#f1c40f';
    ctx.font='bold 62px Arial';
    ctx.textAlign='center';
    ctx.fillText("TIME'S UP!", W/2, H/2-100);

    ctx.fillStyle='#fff';
    ctx.font='bold 40px Arial';
    ctx.fillText(`Laps: ${lapCount}`, W/2, H/2-28);

    if (bestLap) {
      ctx.fillStyle='#2ecc71';
      ctx.font='28px Arial';
      ctx.fillText(`Best Lap: ${bestLap.toFixed(2)}s`, W/2, H/2+28);
    } else {
      ctx.fillStyle='#e74c3c';
      ctx.font='24px Arial';
      ctx.fillText('No laps completed', W/2, H/2+28);
    }

    ctx.fillStyle='#aaa';
    ctx.font='21px Arial';
    ctx.fillText('Press R to race again', W/2, H/2+90);
  }
}

requestAnimationFrame(loop);
  </script>
</body>
</html>
